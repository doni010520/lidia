<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LidIA — PAES</title>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-card: #222633;
  --bg-card-hover: #2a2e3d;
  --border: #2e3347;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0b0;
  --text-muted: #6b7280;
  --accent: #dc2626;
  --accent-light: #ef4444;
  --accent-dark: #b91c1c;
  --accent-bg: rgba(220,38,38,0.12);
  --accent-yellow: #f59e0b;
  --accent-yellow-bg: rgba(245,158,11,0.12);
  --accent-blue: #3b82f6;
  --accent-blue-bg: rgba(59,130,246,0.12);
  --accent-green: #22c55e;
  --accent-green-bg: rgba(34,197,94,0.12);
  --accent-red: #ef4444;
  --accent-red-bg: rgba(239,68,68,0.12);
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; }
.login-overlay {
  position:fixed; inset:0; z-index:1000;
  display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #1e1030 0%, #2d0f1a 60%, #4a1410 100%);
}
.login-box {
  background:var(--bg-secondary); border-radius:16px; padding:40px;
  width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.login-logo { width:72px; height:72px; border-radius:50%; background:var(--accent-dark); margin:0 auto 14px; display:flex; align-items:center; justify-content:center; }
.login-box h1 { text-align:center; font-size:28px; margin-bottom:4px; }
.login-box .subtitle { text-align:center; color:var(--text-muted); margin-bottom:32px; font-size:14px; }
.login-box input {
  width:100%; padding:12px 16px; margin-bottom:16px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  color:var(--text-primary); font-size:14px;
}
.login-box input:focus { outline:none; border-color:var(--accent); }
.login-box .btn-login {
  width:100%; padding:12px; border:none; border-radius:8px;
  background:var(--accent); color:#fff; font-size:16px; font-weight:600;
  cursor:pointer; transition:opacity 0.2s;
}
.login-box .btn-login:hover { opacity:0.85; }
.login-error { color:var(--accent-red); font-size:13px; text-align:center; margin-top:12px; display:none; }
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 24px; background:var(--bg-secondary); border-bottom:1px solid var(--border);
}
.header-left { display:flex; align-items:center; gap:14px; }
.header-brand { display:flex; align-items:center; gap:10px; }
.header-brand-icon { width:34px; height:34px; border-radius:50%; background:var(--accent-dark); display:flex; align-items:center; justify-content:center; }
.header-brand h1 { font-size:17px; font-weight:500; }
.accent { color:var(--accent-light); }
.header-tabs { display:flex; gap:3px; background:var(--bg-primary); border-radius:8px; padding:3px; }
.tab-btn {
  padding:6px 18px; border:none; border-radius:6px; background:transparent;
  color:var(--text-secondary); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s;
}
.tab-btn:hover { color:var(--text-primary); }
.tab-btn.active { background:var(--accent); color:#fff; }
.header-right { display:flex; align-items:center; gap:12px; }
.user-name { color:var(--text-secondary); font-size:13px; }
.btn-logout {
  padding:5px 14px; border:1px solid var(--border); border-radius:6px;
  background:transparent; color:var(--text-secondary); font-size:12px; cursor:pointer;
}
.btn-logout:hover { border-color:var(--accent-red); color:var(--accent-red); }
.disparos-section { padding:24px; max-width:1200px; margin:0 auto; }
.disparos-upload-card, .disparos-history-card {
  background:var(--bg-secondary); border:1px solid var(--border);
  border-radius:var(--radius); padding:24px; margin-bottom:24px;
}
.disparos-upload-card h2, .disparos-history-card h2 { font-size:18px; margin-bottom:20px; }
.upload-dropzone {
  border:2px dashed var(--border); border-radius:var(--radius);
  padding:40px; text-align:center; cursor:pointer; transition:border-color 0.2s, background 0.2s;
}
.upload-dropzone:hover, .upload-dropzone.drag-over { border-color:var(--accent); background:var(--accent-bg); }
.upload-icon { font-size:48px; margin-bottom:12px; color:var(--accent); }
.upload-dropzone p { color:var(--text-secondary); margin-bottom:8px; }
.upload-dropzone .click-hl { color:var(--accent-light); font-weight:500; }
.upload-hint { color:var(--text-muted); font-size:12px; }
.upload-preview {
  display:flex; align-items:center; gap:16px; padding:16px;
  background:var(--bg-card); border-radius:var(--radius); margin-bottom:16px;
}
.preview-thumb {
  width:80px; height:80px; border-radius:8px; overflow:hidden;
  background:var(--bg-primary); display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.preview-thumb img { width:100%; height:100%; object-fit:cover; }
.preview-thumb .file-icon { font-size:32px; color:var(--text-muted); }
.preview-info { display:flex; flex-direction:column; gap:4px; }
.preview-name { font-weight:600; }
.preview-size { color:var(--text-muted); font-size:13px; }
.btn-remove { background:none; border:none; color:var(--accent-red); cursor:pointer; font-size:13px; padding:0; text-align:left; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; color:var(--text-secondary); font-size:13px; margin-bottom:6px; }
.form-group textarea, .form-group input[type="date"], .form-group input[type="time"], .form-group select {
  width:100%; padding:10px 14px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:8px; color:var(--text-primary); font-size:14px; font-family:inherit; resize:vertical;
}
.form-group textarea:focus, .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); }
.form-row { display:flex; gap:16px; }
.form-row .form-group { flex:1; }
.disparos-actions { display:flex; gap:12px; margin-bottom:16px; }
.btn { padding:10px 24px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
.btn:hover { opacity:0.85; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-secondary { background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border); }
.agendar-fields { padding:16px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:16px; }
.disparos-table-wrap { overflow-x:auto; }
.disparos-table { width:100%; border-collapse:collapse; }
.disparos-table th { text-align:left; padding:12px; color:var(--text-muted); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); }
.disparos-table td { padding:12px; border-bottom:1px solid var(--border); font-size:14px; }
.disparos-table tbody tr:hover { background:var(--bg-card-hover); }
.status-badge { display:inline-block; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600; }
.status-badge.agendado { background:var(--accent-yellow-bg); color:var(--accent-yellow); }
.status-badge.enviando { background:var(--accent-bg); color:var(--accent-light); }
.status-badge.concluido { background:var(--accent-green-bg); color:var(--accent-green); }
.status-badge.falhou, .status-badge.cancelado { background:var(--accent-red-bg); color:var(--accent-red); }
.legenda-truncated { max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.disparos-empty { text-align:center; padding:40px; color:var(--text-muted); }
.progress-bar-bg { width:120px; height:8px; background:var(--bg-primary); border-radius:4px; overflow:hidden; }
.progress-bar-fill { height:100%; background:var(--accent-green); border-radius:4px; transition:width 0.3s; }
.progress-bar-fill.sending { background:var(--accent); }
@media (max-width:768px) {
  .header { flex-wrap:wrap; gap:12px; }
  .form-row { flex-direction:column; }
  .disparos-section { padding:12px; }
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M8 28c2-4 6-7 11-8 2-.4 4-.2 6 .5-3-4-7-6-12-5-3 .5-5 2.5-6 5-.3.8-.2 1.5.1 2 .2.3.5.5.9.5z" fill="#fff"/><path d="M30 14c-2-3-5-5-9-5.5-4-.5-7.5 1-10 4 4-2 8-2.5 12-1 3 1.2 5.5 3.5 7 6.5.5-1.5.5-2.8 0-4z" fill="#fff"/><path d="M32 18c-.5-1.5-1.5-3-3-4-2.5 3-4 6.5-4 10.5 0 2 .5 3.8 1.5 5.5 2-2 3.5-4.5 4.5-7 .8-2 1.2-3.5 1-5z" fill="#fff"/><path d="M14 22c-1 1-1.8 2.3-2.2 3.8-.3 1.2-.2 2.5.3 3.7 1.5-1 3-1.5 5-1.5 2.5 0 4.5.8 6 2.5.5-2 .3-4-.5-5.5-1.5-3-4.5-4-8.6-3z" fill="#fff"/></svg>
    </div>
    <h1>Lid<span class="accent">IA</span></h1>
    <p class="subtitle">Paróquia Anglicana Espírito Santo</p>
    <input type="text" id="loginUser" placeholder="Usuário" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<header class="header" id="mainHeader" style="display:none;">
  <div class="header-left">
    <div class="header-brand">
      <div class="header-brand-icon">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="none"><path d="M8 28c2-4 6-7 11-8 2-.4 4-.2 6 .5-3-4-7-6-12-5-3 .5-5 2.5-6 5-.3.8-.2 1.5.1 2 .2.3.5.5.9.5z" fill="#fff"/><path d="M30 14c-2-3-5-5-9-5.5-4-.5-7.5 1-10 4 4-2 8-2.5 12-1 3 1.2 5.5 3.5 7 6.5.5-1.5.5-2.8 0-4z" fill="#fff"/><path d="M32 18c-.5-1.5-1.5-3-3-4-2.5 3-4 6.5-4 10.5 0 2 .5 3.8 1.5 5.5 2-2 3.5-4.5 4.5-7 .8-2 1.2-3.5 1-5z" fill="#fff"/><path d="M14 22c-1 1-1.8 2.3-2.2 3.8-.3 1.2-.2 2.5.3 3.7 1.5-1 3-1.5 5-1.5 2.5 0 4.5.8 6 2.5.5-2 .3-4-.5-5.5-1.5-3-4.5-4-8.6-3z" fill="#fff"/></svg>
      </div>
      <h1>Lid<span class="accent">IA</span> <span style="color:var(--text-muted); font-weight:400; font-size:14px;">PAES</span></h1>
    </div>
    <nav class="header-tabs">
      <button class="tab-btn active" data-tab="disparos" onclick="switchTab('disparos')">Disparos</button>
    </nav>
  </div>
  <div class="header-right">
    <span class="user-name" id="userName"></span>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>
</header>

<section class="disparos-section" id="disparosSection" style="display:none;">
  <div class="disparos-upload-card">
    <h2>Novo disparo</h2>
    <div class="upload-dropzone" id="uploadDropzone">
      <div class="upload-icon">&#128206;</div>
      <p>Arraste um arquivo aqui ou <span class="click-hl">clique para selecionar</span></p>
      <span class="upload-hint">Imagem, PDF ou Video (max 16MB)</span>
      <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.xlsx,video/mp4" hidden>
    </div>
    <div class="upload-preview" id="uploadPreview" style="display:none;">
      <div class="preview-thumb" id="previewThumb"></div>
      <div class="preview-info">
        <span class="preview-name" id="previewName"></span>
        <span class="preview-size" id="previewSize"></span>
        <button class="btn-remove" onclick="removeFile()">Remover</button>
      </div>
    </div>
    <div class="form-group">
      <label for="legendaInput">Legenda / mensagem</label>
      <textarea id="legendaInput" rows="4" placeholder="Digite a mensagem que acompanha o arquivo..."></textarea>
    </div>
    <div class="form-group">
      <label for="filtroSelect">Para quem enviar</label>
      <select id="filtroSelect">
        <option value="">Todos os contatos</option>
        <option value="membro">Apenas membros</option>
        <option value="visitante">Apenas visitantes</option>
      </select>
    </div>
    <div class="disparos-actions">
      <button class="btn btn-primary" onclick="enviarAgora()" id="btnEnviarAgora">Enviar agora</button>
      <button class="btn btn-secondary" onclick="toggleAgendar()">Agendar</button>
    </div>
    <div class="agendar-fields" id="agendarFields" style="display:none;">
      <div class="form-row">
        <div class="form-group"><label for="agendarData">Data</label><input type="date" id="agendarData"></div>
        <div class="form-group"><label for="agendarHora">Hora</label><input type="time" id="agendarHora"></div>
      </div>
      <button class="btn btn-primary" onclick="enviarAgendado()">Confirmar agendamento</button>
    </div>
  </div>
  <div class="disparos-history-card">
    <h2>Historico de disparos</h2>
    <div class="disparos-table-wrap">
      <table class="disparos-table" id="disparosTable">
        <thead><tr><th>Data</th><th>Arquivo</th><th>Legenda</th><th>Status</th><th>Progresso</th><th>Acoes</th></tr></thead>
        <tbody id="disparosBody"></tbody>
      </table>
      <div class="disparos-empty" id="disparosEmpty" style="display:none;">Nenhum disparo encontrado.</div>
    </div>
  </div>
</section>

<script>
let selectedFile=null;
function authHeaders(){const t=sessionStorage.getItem('lidia_token');return t?{'Authorization':'Bearer '+t}:{};}
async function doLogin(){
  const user=document.getElementById('loginUser').value,pass=document.getElementById('loginPass').value,err=document.getElementById('loginError');
  err.style.display='none';
  try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
  if(!r.ok){err.textContent='Usuario ou senha incorretos';err.style.display='';return;}
  const d=await r.json();sessionStorage.setItem('lidia_token',d.access_token);sessionStorage.setItem('lidia_user',d.username);showApp();
  }catch(e){err.textContent='Erro de conexao';err.style.display='';}
}
function showApp(){document.getElementById('loginOverlay').style.display='none';document.getElementById('mainHeader').style.display='';document.getElementById('disparosSection').style.display='';document.getElementById('userName').textContent=sessionStorage.getItem('lidia_user')||'';loadDisparos();}
function doLogout(){sessionStorage.clear();location.reload();}
if(sessionStorage.getItem('lidia_token'))showApp();
document.getElementById('loginPass').addEventListener('keyup',e=>{if(e.key==='Enter')doLogin();});
function switchTab(tab){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.getElementById('disparosSection').style.display=tab==='disparos'?'':'none';if(tab==='disparos')loadDisparos();}
const dz=document.getElementById('uploadDropzone'),fi=document.getElementById('fileInput');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
fi.addEventListener('change',()=>{if(fi.files[0])handleFile(fi.files[0]);});
function handleFile(f){if(f.size>16*1024*1024){alert('Arquivo maior que 16MB');return;}selectedFile=f;dz.style.display='none';const prev=document.getElementById('uploadPreview');prev.style.display='flex';document.getElementById('previewName').textContent=f.name;document.getElementById('previewSize').textContent=(f.size/1024/1024).toFixed(2)+' MB';const thumb=document.getElementById('previewThumb');if(f.type.startsWith('image/'))thumb.innerHTML='<img src="'+URL.createObjectURL(f)+'">';else thumb.innerHTML='<span class="file-icon">'+(f.type.includes('pdf')?'📄':'🎥')+'</span>';}
function removeFile(){selectedFile=null;fi.value='';dz.style.display='';document.getElementById('uploadPreview').style.display='none';}
async function uploadToServer(file){const fd=new FormData();fd.append('file',file);const r=await fetch('/api/disparos/upload',{method:'POST',headers:authHeaders(),body:fd});if(!r.ok)throw new Error('Upload falhou: '+(await r.text()));return await r.json();}
async function enviarAgora(){
  if(!selectedFile)return alert('Selecione um arquivo.');const legenda=document.getElementById('legendaInput').value.trim();if(!legenda)return alert('Digite uma legenda.');const filtro=document.getElementById('filtroSelect').value||null;
  try{const cnt=await fetch('/api/disparos/contatos-count'+(filtro?'?status='+filtro:''),{headers:authHeaders()});const{count}=await cnt.json();if(!confirm('Disparar para ~'+count+' contatos?\nLegenda: '+legenda.slice(0,80)+(legenda.length>80?'...':'')))return;
  document.getElementById('btnEnviarAgora').disabled=true;const meta=await uploadToServer(selectedFile);
  const r=await fetch('/api/disparos',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({arquivo_url:meta.arquivo_url,arquivo_tipo:meta.arquivo_tipo,arquivo_nome:meta.arquivo_nome,legenda,enviar_agora:true,filtro_status:filtro})});
  if(r.status===409)return alert('Ja existe um disparo em andamento.');if(!r.ok)return alert('Erro: '+(await r.text()));alert('Disparo iniciado!');removeFile();document.getElementById('legendaInput').value='';loadDisparos();}catch(e){alert(e.message);}finally{document.getElementById('btnEnviarAgora').disabled=false;}
}
function toggleAgendar(){const f=document.getElementById('agendarFields');f.style.display=f.style.display==='none'?'':'none';}
async function enviarAgendado(){
  if(!selectedFile)return alert('Selecione um arquivo.');const legenda=document.getElementById('legendaInput').value.trim();if(!legenda)return alert('Digite uma legenda.');const data=document.getElementById('agendarData').value,hora=document.getElementById('agendarHora').value;if(!data||!hora)return alert('Informe data e hora.');const filtro=document.getElementById('filtroSelect').value||null;
  try{const meta=await uploadToServer(selectedFile);const agendado_para=new Date(data+'T'+hora).toISOString();
  const r=await fetch('/api/disparos',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({arquivo_url:meta.arquivo_url,arquivo_tipo:meta.arquivo_tipo,arquivo_nome:meta.arquivo_nome,legenda,enviar_agora:false,agendado_para,filtro_status:filtro})});
  if(r.status===409)return alert('Ja existe um disparo em andamento.');if(!r.ok)return alert('Erro: '+(await r.text()));alert('Disparo agendado!');removeFile();document.getElementById('legendaInput').value='';document.getElementById('agendarFields').style.display='none';loadDisparos();}catch(e){alert(e.message);}
}
async function loadDisparos(){
  try{const r=await fetch('/api/disparos',{headers:authHeaders()});if(r.status===401){doLogout();return;}const data=await r.json();const body=document.getElementById('disparosBody'),empty=document.getElementById('disparosEmpty');if(!data.length){body.innerHTML='';empty.style.display='';return;}empty.style.display='none';
  body.innerHTML=data.map(d=>{const dt=new Date(d.created_at).toLocaleString('pt-BR');const pct=d.total?Math.round(d.enviados/d.total*100):0;const canCancel=['agendado','enviando'].includes(d.status);const isSending=d.status==='enviando';
  return '<tr><td>'+dt+'</td><td>'+(d.arquivo_nome||d.arquivo_tipo)+'</td><td><span class="legenda-truncated" title="'+(d.legenda||'').replace(/"/g,'&quot;')+'">'+(d.legenda||'').slice(0,50)+'</span></td><td><span class="status-badge '+d.status+'">'+d.status+'</span></td><td><div class="progress-bar-bg"><div class="progress-bar-fill'+(isSending?' sending':'')+'" style="width:'+pct+'%"></div></div><small>'+d.enviados+'/'+d.total+' ('+d.falhas+' falhas)</small></td><td>'+(canCancel?'<button class="btn-remove" onclick="cancelarDisparo(\''+d.id+'\')">Cancelar</button>':'')+'</td></tr>';}).join('');}catch(e){console.error(e);}
}
async function cancelarDisparo(id){if(!confirm('Cancelar este disparo?'))return;await fetch('/api/disparos/'+id+'/cancelar',{method:'PATCH',headers:authHeaders()});loadDisparos();}
setInterval(()=>{if(document.getElementById('disparosSection').style.display!=='none'&&sessionStorage.getItem('lidia_token'))loadDisparos();},10000);
</script>
</body>
</html>
