version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lidia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lidia_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lidia}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Aplica todas as migrações na primeira inicialização do banco.
      # Ordem alfabética importa — prefixos 001, 002, 003, 005 garantem.
      - ./migrations/001_lidia_schema.sql:/docker-entrypoint-initdb.d/001_lidia_schema.sql:ro
      - ./migrations/002_unique_eventos.sql:/docker-entrypoint-initdb.d/002_unique_eventos.sql:ro
      - ./migrations/003_disparos.sql:/docker-entrypoint-initdb.d/003_disparos.sql:ro
      - ./migrations/005_eventos_origem.sql:/docker-entrypoint-initdb.d/005_eventos_origem.sql:ro
      - ./migrations/006_atendimentos_e_funcoes.sql:/docker-entrypoint-initdb.d/006_atendimentos_e_funcoes.sql:ro
      - ./migrations/007_pastores_e_liderancas.sql:/docker-entrypoint-initdb.d/007_pastores_e_liderancas.sql:ro
      - ./migrations/008_contacts_campos_extra.sql:/docker-entrypoint-initdb.d/008_contacts_campos_extra.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lidia}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
